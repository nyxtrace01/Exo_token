{% extends 'base.html' %}
{% block title %}— Inscription{% endblock %}

{% block content %}
<div style="max-width:480px;margin:0 auto">
  <div class="card">
    <div class="card-title">📝 Créer un compte électeur</div>

    <!--  info hash affiché -->
    <div class="info-box">
      🔒 <strong>Sécurité </strong> — Votre mot de passe ne sera
      jamais stocké en clair. Il sera <em>hashé</em> avant d'être enregistré.
    </div>

    <form method="POST" action="/inscription">
      <div class="form-group">
        <label>Nom complet</label>
        <input type="text" name="nom" placeholder="Votre nom..." required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="mot_de_passe" placeholder="••••••••" required minlength="4">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Créer mon compte</button>
    </form>

    <p style="text-align:center;margin-top:18px;color:#718096;font-size:.9rem">
      Déjà inscrit ? <a href="/connexion" style="color:#3182ce;font-weight:600">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
